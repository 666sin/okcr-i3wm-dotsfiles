[colors]
background = ${xrdb:color0:#1e1e2e}
foreground = ${xrdb:color7:#cdd6f4}
primary = ${xrdb:color2:#89b4fa}
secondary = ${xrdb:color1:#f38ba8}
accent = ${xrdb:color4:#fab387}
success = ${xrdb:color2:#a6e3a1}
gray = #45475a
# Glow Color (Bright Primary)
glow = #b4befe
transparent = #00000000

[bar/main]
width = 98%
height = 28pt
offset-x = 1%
offset-y = 1%
radius = 12
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
border-size = 4pt
border-color = ${colors.transparent}
padding-left = 2
padding-right = 2
module-margin = 1

enable-ipc = true
cursor-click = pointer
cursor-scroll = ns-resize

# Increased font size for larger Workspace points
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=11;3"
font-1 = "JetBrainsMono Nerd Font:size=16;4"

modules-left = powermenu date media
modules-center = xworkspaces
modules-right = filesystem cpu memory pulseaudio tray

[module/xworkspaces]
type = internal/xworkspaces

pin-workspaces = true
index-sort = true
enable-click = true
enable-scroll = true
reverse-scroll = true

# Workspace Icons (Matching point logic)
icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;

# Active: Larger, Glowing Primary Color
label-active = 
label-active-foreground = ${colors.glow}
label-active-font = 2
label-active-padding = 2
label-active-shadow-color = ${colors.glow}

# Occupied: Darker/Bold White
label-occupied = 
label-occupied-foreground = ${colors.foreground}
label-occupied-font = 2
label-occupied-padding = 2

# Empty: Dark Gray
label-empty = 
label-empty-foreground = ${colors.gray}
label-empty-font = 2
label-empty-padding = 2

[module/powermenu]
type = custom/text
label = "  "
label-foreground = ${colors.secondary}
label-font = 2
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/media]
type = custom/script
tail = true
interval = 1
exec = ~/.config/polybar/scripts/media_status.sh
click-left = playerctl play-pause
click-right = playerctl next
double-click-right = playerctl previous
label = %output%
label-foreground = ${colors.success}
format-prefix = " | "

[module/date]
type = internal/date
interval = 1
date = 󱑂 %I:%M %p
label = %date%
label-foreground = ${colors.primary}

[module/filesystem]
type = internal/fs
mount-0 = /
format-mounted-prefix = "󰋊 "
label-mounted = %used%

[module/cpu]
type = internal/cpu
format-prefix = "󰍛 "
label = %percentage%%

[module/memory]
type = internal/memory
format-prefix = "󰘚 "
label = %used%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
label-volume = %percentage%%

[module/tray]
type = internal/tray
tray-size = 18px
tray-spacing = 8px

[settings]
screenchange-reload = true
pseudo-transparency = true
